name: CI — Global Trade & Logistics Platform

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new push arrives on the same branch.
# Prevents wasted compute on stale commits.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Lint ─────────────────────────────────────────────────────────────
  # Fails fast: if lint fails, test job does not run.
  # Rationale: formatting and type errors are cheap to catch early.
  # A client reading the CI history sees green lint = disciplined codebase.
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: ruff — fast linter (catches F401, E501, unused imports)
        run: ruff check .

      - name: black — formatting check
        run: black --check .

      - name: mypy — static type checking
        run: mypy apps/
        env:
          DJANGO_SETTINGS_MODULE: config.settings.base

  # ── Job 2: Test ─────────────────────────────────────────────────────────────
  test:
    name: Test Suite (PostgreSQL 17)
    runs-on: ubuntu-latest
    needs: lint  # only runs if lint passes

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: global_trade_test
          POSTGRES_USER: global_trade_user
          POSTGRES_PASSWORD: postgres123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: config.settings.base
      DATABASE_URL: postgresql://global_trade_user:postgres123@localhost:5432/global_trade_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run migrations
        run: python manage.py migrate

      - name: Django system check (catches config errors before tests run)
        run: python manage.py check

      - name: Run tests with coverage
        run: |
          pytest \
            --tb=short \
            --cov=apps \
            --cov-report=term-missing \
            --cov-fail-under=80
        # --cov-fail-under=80: build fails if coverage drops below 80%.
        # This is a portfolio-visible quality gate — clients see it in the badge.

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: htmlcov/

  # ── Job 3: Deploy Gate ───────────────────────────────────────────────────────
  # PORTFOLIO SIGNAL: This job makes the quality bar explicit and public.
  # A Fiverr client who clicks "Actions" sees: deploy is gated on bug severity.
  # This communicates engineering discipline without a single word of explanation.
  deploy-gate:
    name: Deploy Gate — Bug Severity Check
    runs-on: ubuntu-latest
    needs: test  # only runs if tests pass
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for unresolved Critical bugs
        run: |
          # Scan BUG_REPORT.md for any Critical bug that is not Fixed.
          # Pattern: a line with "Severity: Critical" followed (within 20 lines)
          # by "STATUS: " that is NOT "STATUS: Fixed".
          python - <<'EOF'
          import re
          import sys

          with open("BUG_REPORT.md", "r") as f:
              content = f.read()

          # Find all bug blocks
          bug_blocks = re.split(r"^## BUG-\d+", content, flags=re.MULTILINE)

          unresolved_critical = []
          for block in bug_blocks:
              is_critical = "Severity: Critical" in block
              is_fixed = "STATUS: Fixed" in block
              if is_critical and not is_fixed:
                  # Extract bug title from first line
                  first_line = block.strip().split("\n")[0][:80]
                  unresolved_critical.append(first_line)

          if unresolved_critical:
              print("🚫 Critical bugs unresolved. Deploy blocked.")
              for bug in unresolved_critical:
                  print(f"  ✗ {bug}")
              sys.exit(1)
          else:
              print("✅ All Critical bugs resolved. Deploy approved.")
          EOF

      - name: Notify Railway deploy
        # Railway auto-deploys on push to main when connected to GitHub.
        # This step is a confirmation marker in the CI log.
        run: echo "✅ Deploy gate passed. Railway will auto-deploy from main."